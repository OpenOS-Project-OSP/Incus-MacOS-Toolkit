# /etc/bdfs/boot.conf - BDFS immutable boot configuration
#
# This file is read by:
#   - bdfs-image-update (image lifecycle manager)
#   - The initramfs/dracut boot scripts (via kernel cmdline parameters)
#
# Kernel cmdline parameters take precedence over this file for boot-time
# settings.  This file is used for post-boot management (updates, snapshots).

# ── Image location ────────────────────────────────────────────────────────

# Path to the active root DwarFS image, relative to the BTRFS partition root.
# Must match the bdfs.image= kernel parameter.
image_path = /images/system.dwarfs

# ── Update source ─────────────────────────────────────────────────────────

# URL to fetch updated root images from.
# Leave empty to disable automatic updates.
#update_url = https://example.com/images/system.dwarfs

# Expected SHA-256 checksum of the new image (hex string).
# If set, bdfs-image-update verifies the download before rotating.
# Takes precedence over a .sha256 sidecar file from the update server.
#update_checksum =

# ── Signature verification ────────────────────────────────────────────────

# Path to the GPG keyring containing trusted release signing key(s).
# Create with:
#   gpg --no-default-keyring --keyring /etc/bdfs/trusted.gpg \
#       --import /path/to/release-key.asc
# Leave unset to use the default (/etc/bdfs/trusted.gpg).
#gpg_keyring = /etc/bdfs/trusted.gpg

# Set to 1 to make GPG signature verification mandatory.
# If 0 (default), GPG is verified when a signature is available but
# the update proceeds with a warning when no signature is present.
# A present-but-invalid signature is always fatal regardless of this setting.
#require_gpg = 0

# ── Snapshot policy ───────────────────────────────────────────────────────

# Take a BTRFS snapshot of the images subvolume before each image rotation.
# Snapshots are named: <images_subvol>_snap_<timestamp>
# Set to 0 to disable.
snapshot_on_update = 1

# Maximum number of snapshots to retain (oldest are pruned).
# Set to 0 for unlimited.
max_snapshots = 10

# ── Boot parameters (reference) ───────────────────────────────────────────
#
# These are set in /etc/default/grub GRUB_CMDLINE_LINUX, not here.
# Documented for reference:
#
#   bdfs.root=/dev/sda2          BTRFS partition holding the image
#   bdfs.image=/images/system.dwarfs  Path to image within partition
#   bdfs.upper=/dev/sda3         BTRFS partition for writable upper layer
#   bdfs.upper.subvol=upper      Subvolume name for writable layer
#   bdfs.rollback                Boot the .prev image instead
#   bdfs.shell                   Drop to shell before mounting (debug)
