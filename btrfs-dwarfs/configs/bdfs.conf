# /etc/bdfs/bdfs.conf - BTRFS+DwarFS framework configuration
#
# All values shown are defaults. Uncomment and modify as needed.

[daemon]
# Control device path
#ctl_device = /dev/bdfs_ctl

# Unix socket for CLI communication
#socket_path = /run/bdfs/daemon.sock

# State directory (stores job state, image metadata)
#state_dir = /var/lib/bdfs

# Worker thread count (0 = auto-detect from CPU count)
#worker_threads = 0

[tools]
# Paths to required external tools.
# If not set, the daemon searches $PATH.
#mkdwarfs      = /usr/bin/mkdwarfs
#dwarfs        = /usr/bin/dwarfs
#dwarfsextract = /usr/bin/dwarfsextract
#dwarfsck      = /usr/bin/dwarfsck
#btrfs         = /usr/bin/btrfs

[defaults]
# Default DwarFS compression algorithm for new exports
# Options: zstd (default), lzma, lz4, brotli, none
#compression = zstd

# Default DwarFS block size (log2). 22 = 4 MiB blocks.
# Larger blocks improve compression but increase memory use.
#block_size_bits = 22

# Default DwarFS FUSE mount cache size in MiB
#cache_size_mb = 256

[blend]
# Default mount flags for blend layer mounts
# writeback: allow writes to propagate to BTRFS upper layer
#writeback = true

# lazy_load: defer DwarFS image mounts until first access
#lazy_load = true
