name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── linuxfs: build, vet, test, cross-compile ──────────────────────────────

  linuxfs-build:
    name: linuxfs / build + vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linuxfs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: linuxfs/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  linuxfs-cross:
    name: linuxfs / cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linuxfs
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: linuxfs/go.sum
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null .

  # ── macos-vm: shell lint, Python lint, YAML lint ──────────────────────────

  macos-vm-lint:
    name: macos-vm / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: |
          sudo apt-get install -y --no-install-recommends shellcheck
          pip install ruff yamllint
      - name: shellcheck
        run: |
          shellcheck macos-vm/boot/boot.sh
          shellcheck macos-vm/fetch/convert-image.sh
          shellcheck macos-vm/guest-tools/optimize.sh
          shellcheck macos-vm/guest-tools/useradd-bulk.sh
          shellcheck macos-vm/incus/setup.sh
          shellcheck macos-vm/incus/optimize-guest.sh
      - name: ruff
        run: ruff check macos-vm/fetch/fetch-macos.py
      - name: yamllint
        run: yamllint -d relaxed macos-vm/incus/profile.yaml
      - name: Python syntax
        run: python3 -m py_compile macos-vm/fetch/fetch-macos.py

  # ── compat: mlsblk build (macOS only), shellcheck ────────────────────────

  compat-lint:
    name: compat / shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y --no-install-recommends shellcheck
      - name: shellcheck
        run: |
          shellcheck compat/linuxify/linuxify
          shellcheck compat/install.sh

  compat-mlsblk:
    name: compat / mlsblk (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build mlsblk
        run: make -C compat mlsblk
      - name: Verify binary
        run: test -f compat/mlsblk/mlsblk

  compat-bsdcoreutils:
    name: compat / bsdcoreutils submodule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify submodule registered and populated
        run: |
          # Confirm .gitmodules has the entry
          grep -q "DiegoMagdaleno/BSDCoreUtils" .gitmodules
          # Confirm the submodule directory was checked out
          test -d compat/bsdcoreutils/upstream
          ls compat/bsdcoreutils/upstream/ | head -5

  # ── btrfs-dwarfs: userspace build + unit tests ────────────────────────────

  btrfs-dwarfs-build:
    name: btrfs-dwarfs / userspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: btrfs-dwarfs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc clang libc6-dev
      - name: Configure (Release)
        run: |
          cmake -S userspace -B build/release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON \
            -DBUILD_TESTS=OFF
      - name: Build
        run: cmake --build build/release --parallel
      - name: Verify binaries
        run: |
          test -f build/release/bdfs_daemon
          test -f build/release/bdfs

  btrfs-dwarfs-unit:
    name: btrfs-dwarfs / unit tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: btrfs-dwarfs
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc clang libc6-dev
      - name: Configure (Debug + ASan)
        run: |
          cmake -S userspace -B build/asan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON \
            -DBUILD_TESTS=ON \
            -DENABLE_ASAN=ON
      - name: Build
        run: cmake --build build/asan --parallel
      - name: Run unit tests
        run: cd build/asan && ctest --output-on-failure --timeout 30

  btrfs-dwarfs-clang:
    name: btrfs-dwarfs / clang build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: btrfs-dwarfs
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build clang
      - name: Configure
        run: |
          cmake -S userspace -B build/clang \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON
      - name: Build
        run: cmake --build build/clang --parallel

  btrfs-dwarfs-kernel:
    name: btrfs-dwarfs / kernel module (compile check)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: btrfs-dwarfs
    steps:
      - uses: actions/checkout@v4
      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            linux-headers-$(uname -r) build-essential kmod
      - name: Build kernel module
        # continue-on-error: the runner kernel may lack BTRFS/FUSE config.
        # We still catch C syntax errors and missing headers.
        run: make kernel KDIR=/lib/modules/$(uname -r)/build
        continue-on-error: true
      - name: Report result
        run: |
          if [ -f kernel/btrfs_dwarfs/btrfs_dwarfs.ko ]; then
            echo "Kernel module compiled successfully"
            modinfo kernel/btrfs_dwarfs/btrfs_dwarfs.ko
          else
            echo "Kernel module did not produce .ko (may need BTRFS/FUSE kernel config)"
          fi

  btrfs-dwarfs-scripts:
    name: btrfs-dwarfs / shellcheck scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          wget -qO- https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin shellcheck-stable/shellcheck
      - name: shellcheck
        run: shellcheck btrfs-dwarfs/scripts/vm-install.sh

  btrfs-dwarfs-static-analysis:
    name: btrfs-dwarfs / cppcheck
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: btrfs-dwarfs
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y --no-install-recommends cppcheck
      - name: cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=preprocessorErrorDirective \
            --suppress=uninitvar:userspace/daemon/bdfs_policy.c \
            -I include \
            -I include/uapi \
            userspace/daemon/ userspace/cli/

  # ── linuxfs: VM integration test (boot Alpine, mount ext4, NFS) ──────────

  linuxfs-integration:
    name: linuxfs / integration test (Alpine + NFS)
    runs-on: ubuntu-latest
    # Needs KVM access; GitHub-hosted ubuntu-latest runners have /dev/kvm.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: linuxfs/go.sum
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils \
            nfs-common nfs-kernel-server \
            e2fsprogs \
            cloud-image-utils
      - name: Enable KVM access for runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm "$USER" || true
      - name: Smoke-test QEMU launch
        # Run QEMU directly to confirm it starts and prints version output.
        run: |
          qemu-system-x86_64 --version
          echo "KVM available: $(test -e /dev/kvm && echo yes || echo no)"
          ls -la /dev/kvm 2>/dev/null || true
          # Download the Alpine image and try launching QEMU directly
          IMG_DIR="$HOME/.cache/linuxfs/alpine"
          mkdir -p "$IMG_DIR"
          IMG="$IMG_DIR/nocloud_alpine-3.21.6-x86_64-bios-cloudinit-r0.qcow2"
          if [ ! -f "$IMG" ]; then
            curl -fsSL -o "$IMG" \
              "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/cloud/nocloud_alpine-3.21.6-x86_64-bios-cloudinit-r0.qcow2"
          fi
          echo "Image size: $(du -sh "$IMG")"
          # Build a cloud-init seed ISO the same way the Go code does
          SEED_DIR="$HOME/.cache/linuxfs/cloud-init-seed-alpine"
          SEED_ISO="$HOME/.cache/linuxfs/cloud-init-seed-alpine.iso"
          mkdir -p "$SEED_DIR"
          printf '#cloud-config\nusers:\n  - name: alpine\n    ssh_authorized_keys: []\n' > "$SEED_DIR/user-data"
          printf 'instance-id: test\nlocal-hostname: test\n' > "$SEED_DIR/meta-data"
          cloud-localds "$SEED_ISO" "$SEED_DIR/user-data" "$SEED_DIR/meta-data"
          echo "Seed ISO: $(ls -lh "$SEED_ISO")"
          # Try a minimal QEMU launch with seed ISO
          timeout 5 qemu-system-x86_64 \
            -accel kvm -m 512 -nographic -serial null -monitor none \
            -drive "if=virtio,format=qcow2,file=$IMG" \
            -drive "if=virtio,format=raw,file=$SEED_ISO,readonly=on" \
            -netdev "user,id=net0" -device "virtio-net-pci,netdev=net0" \
            2>&1 | head -20 || true
          # Now try as root (same as the test)
          echo "--- as root ---"
          sudo timeout 5 qemu-system-x86_64 \
            -accel kvm -m 512 -nographic -serial null -monitor none \
            -drive "if=virtio,format=qcow2,file=$IMG" \
            -drive "if=virtio,format=raw,file=$SEED_ISO,readonly=on" \
            -netdev "user,id=net0" -device "virtio-net-pci,netdev=net0" \
            2>&1 | head -20 || true
      - name: Run integration test (as root for NFS mount)
        working-directory: linuxfs
        # sudo -E preserves the Go environment set up by setup-go.
        run: |
          sudo -E "$(which go)" test \
            -v -tags integration -timeout 15m \
            ./integration/

  # ── Summary gate: all required jobs must pass ─────────────────────────────

  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    needs:
      - linuxfs-build
      - linuxfs-cross
      - linuxfs-integration
      - macos-vm-lint
      - compat-lint
      - compat-mlsblk
      - compat-bsdcoreutils
      - btrfs-dwarfs-build
      - btrfs-dwarfs-unit
      - btrfs-dwarfs-clang
      - btrfs-dwarfs-kernel
      - btrfs-dwarfs-scripts
      - btrfs-dwarfs-static-analysis
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          # btrfs-dwarfs-kernel is allowed to fail (continue-on-error in job)
          skip = {'btrfs-dwarfs-kernel'}
          failed = [k for k, v in needs.items()
                    if v['result'] not in ('success', 'skipped') and k not in skip]
          print('\n'.join(failed))
          ")
          if [ -n "$failed" ]; then
            echo "Failed jobs:"
            echo "$failed"
            exit 1
          fi
          echo "All required jobs passed."
